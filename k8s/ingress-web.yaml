# Exposes the JobFit AI web UI at https://jobfit.broken-top.com
# TLS is provided by the wildcard cert managed by cert-manager.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobfit-web
  namespace: jobfit
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/hostname: jobfit.broken-top.com
spec:
  tls:
    - hosts:
        - jobfit.broken-top.com
  rules:
    - host: jobfit.broken-top.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jobfit-web
                port:
                  number: 7860
