apiVersion: batch/v1
kind: CronJob
metadata:
  name: jobfit-worker
  namespace: jobfit
spec:
  schedule: "0 6 * * *" # daily at 06:00 in the cluster's local time zone
  concurrencyPolicy: Forbid # never overlap SQLite writers if a run overruns
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 5400 # 90 min budget for Pi-speed local-LLM inference
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: jobfit-worker
              image: registry.jobfit.svc.cluster.local:5000/jobfit:latest
              command: ["python", "-m", "worker.main"]
              envFrom:
                - configMapRef:
                    name: jobfit-config
                - secretRef:
                    name: jobfit-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: jobfit-data
